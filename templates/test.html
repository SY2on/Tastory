{% extends 'index.html' %}
{% block content %}
<div class="banner"></div>
<div class="BookOfMonth">
    <div class="title">이달의 책</div>
    <div class="showbook">
        <div class="bookcover">
            {% for show in data %}
            <img src="{{show['bookcover']}}" alt="{{show['title']}}">
            {% endfor %}
        </div>
    </div>
</div>
<div class="ReviewOfMonth">
    <div class="title">이달의 리뷰</div>
    <div class="showReview"></div>
</div>
<div class="SuggestionLibrary">
    <div class="showLibrary"></div>
</div>
{% endblock %}
