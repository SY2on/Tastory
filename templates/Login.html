<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/load_fonts.css')}}" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="Login_Page">
        <div class="container">
            <div class="row">
                <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
                    <div class="card border-0 shadow my-5">
                        <div class="card-body p-4 p-sm-5">
                            <p class="card-title text-center mb-5 fw-light fs-1">테이스토리</p>
                            <form>
                                <div class="mb-3">
                                    <label for="exampleInputEmail1" class="form-label">아이디</label>
                                    <input type="email" class="form-control" id="exampleInputEmail1"
                                        aria-describedby="emailHelp">
                                </div>
                                <div class="mb-3">
                                    <label for="exampleInputPassword1" class="form-label">비밀번호</label>
                                    <input type="password" class="form-control" id="exampleInputPassword1">
                                </div>
                                <div class="d-grid gap-2">
                                    <button class="btn" type="submit">로그인하기</button>
                                </div>
                            </form>
                            <hr class="my-4">
                            <div class="DownMenu">
                                <div class="LeftGruop">
                                    <p>아직 가입하지 않으셨나요?</p>
                                    <div class="div">가입하기 ></div>
                                </div>
                                <div class="RightGruop">
                                    <p>계정 정보를 잊으셨나요?</p>
                                    <div class="div">계정찾기 ></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>

</html>
