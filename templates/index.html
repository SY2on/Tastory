<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/load_fonts.css')}}" rel="stylesheet">
    <!-- <link href="{{ url_for('static', filename='css/main_view.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/b.css')}}" rel="stylesheet"> -->



    <title>Document</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-white bg-white test ">
        <a class="navbar-brand logo_title media_option" href="#">테이스토리</a>
        <div class="form-group">
            <div class="form-group has-feedback">
                <input type="text" class="form-control" id="inputValidation" placeholder="책 검색하기"/>
                <span class="glyphicon glyphicon-search form-control-feedback"></span>
            </div>
        </div>
        <i class="bi bi-bell-fill"></i>
    </nav>
    <div class="container-fluid h-100 view">
        <div class="row">
            <div class="leftsidebar media_option">
                <div class="menu">
                    <div class="items first">탐색</div>
                    <div class="items">내 서재</div>
                    <div class="items">읽고 싶은 책</div>
                </div>
                <div class="user_info">
                    <div class="profile">
                        <img src="{{UserInfo[0]['profile_image']}}">
                    </div>
                    <div class="name">{{UserInfo[0]['name']}}</div>
                </div>
            </div>
            <div class="ShowArea" id="autobox">
                {% block content %}
                {% endblock %}
            </div>
        </div>        
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js')}}"></script>
</html>
