<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/load_fonts.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main_view.css')}}" rel="stylesheet">
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js')}}"></script>

    <title>Document</title>
</head>

<body>
    <nav>
        <header
            class="d-flex align-items-center justify-content-center justify-content-md-between border-bottom">
            <a href="/" class="text-dark text-decoration-none">
                테이스토리
            </a>

            <div class="form-group col-lg-4">
                <div class="form-group has-feedback">
                    <input type="text" class="form-control" id="inputValidation" placeholder="책 검색하기"/>
                    <span class="glyphicon glyphicon-search form-control-feedback"></span>
                </div>
            </div>

            <div class="col-md-3 text-end">
                <button class="btn"><i class="bi bi-bell-fill"></i></button>
            </div>
        </header>
    </nav>
    <nav id="sidebar-nav" class="collapse d-lg-block collapse bg-white">
        <div class="position-sticky">
            <div class="list-group list-group-flush mx-3 mt-4">
                <a href="#" class="list-group-item list-group-item-action py-2 ripple" aria-current="true">
                    <i class="fas fa-tachometer-alt fa-fw me-3"></i><span>탐색</span>
                </a>
                <a href="#" class="list-group-item list-group-item-action py-2 ripple">
                    <i class="fas fa-chart-area fa-fw me-3"></i><span>내 서재</span>
                </a>
                <a href="#" class="list-group-item list-group-item-action py-2 ripple">
                    <i class="fas fa-chart-area fa-fw me-3"></i><span>읽고 싶은 책</span>
                </a>
            </div>
        </div>
    </nav>
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
